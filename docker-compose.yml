version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: portal
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://portal:portal@db:5432/portal
      ADMIN_USER_IDS: "1"
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

  analytics:
    build: ./analytics
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://portal:portal@db:5432/portal
    volumes:
      - ./reports:/reports
    profiles:
      - analytics

volumes:
  pgdata:
